function AttachMeter(size, center, radius, strokeWidth) {
  
  const xmlns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(xmlns, "svg");
  svg.setAttributeNS(null, "shape-rendering", "geometricPrecision");
  svg.setAttributeNS(null, "viewBox", `0 0 ${size} ${size}`);
  svg.setAttributeNS(null, "width", size);
  svg.setAttributeNS(null, "height", size);
  svg.setAttributeNS(null, "aria-hidden", true);
  svg.classList.add("progress-root");

  
  const track = document.createElementNS(xmlns, "circle");
  track.setAttributeNS(null, "cx", center);
  track.setAttributeNS(null, "cy", center);
  track.setAttributeNS(null, "r", radius);
  track.setAttributeNS(null, "stroke-width", strokeWidth);
  track.classList.add("progress-track");

  
  const indicator = document.createElementNS(xmlns, "circle");
  indicator.id = "progress-indicator";
  indicator.setAttributeNS(null, "cx", center);
  indicator.setAttributeNS(null, "cy", center);
  indicator.setAttributeNS(null, "r", radius);
  indicator.setAttributeNS(null, "stroke-width", strokeWidth);

  svg.appendChild(track);
  svg.appendChild(indicator);

  const meterContainer = UI.GetControl("CNT_Meter");
  meterContainer.AppendChild(svg);
}

function UpdateMeterProgress(progress, max, radius) {
  const indicator = document.getElementById("progress-indicator");

  if (!indicator || progress === undefined || max === undefined) return;

  if (progress > max) progress = max;

  const dashArray = 2 * Math.PI * radius;
  const dashOffset = dashArray * (progress / max);
  indicator.setAttributeNS(null, "stroke-dasharray", dashArray);
  indicator.setAttributeNS(null, "stroke-dashoffset", dashOffset);
}

  detectTimingErrorCurrentTime2,
) {
  D2L.Rpc.Create(
    "DoUtcTimeResyncRequest",
    callback,
    "/d2l/lms/quizzing/rpc/rpc_functions.d2l",
  ).Call(
    timeStartedTicks,
    typeof timeLimit == "undefined" ? 30000 : timeLimit,
    clientStartTime,
    clientStartTimeSanityCheck,
    detectTimingErrorTimeTaken1,
    detectTimingErrorCurrentTime1,
    detectTimingErrorTimeTaken2,

function CalculateHalfTime(timeLimitInSeconds) {
  return Math.floor(timeLimitInSeconds / 120 /*60s/min, half time*/);
}

function TimeRequest(
  timeTakenDisplay,
  timeLeftDisplay,
  serverTimeTaken,
  clientQuizStart,
  sanityCheckClientQuizStart,
  meterRadius,
) {
  
  var timeLeft;

  var clientTimeTaken = GetClientTimeTakenSeconds(clientQuizStart);
  var timeTaken = serverTimeTaken + clientTimeTaken;
  var halfTimeEst = CalculateHalfTime(timeLimit);

  if (enforceTimeLimit) {
    timeLeft = timeLimit - timeTaken;
  }

  var lblTimer = GetTBTimerControl();
  if (!lblTimer) {
    return; 
  }

  var DisplayFormatTime = function (inTime) {
    var hours = Math.floor(inTime / 3600);
    var minutes = Math.floor(inTime / 60) - hours * 60;
    var seconds = inTime - minutes * 60 - hours * 3600;
    if (minutes < 10) {
      minutes = "0" + minutes;
    }
    if (seconds < 10) {
      seconds = "0" + seconds;
    }

    return durationFormat
      .replace(/\bhhh\b/g, hours)
      .replace(/\bmm\b/g, minutes)
      .replace(/\bss\b/g, seconds)
      .replace(/\{/g, "")
      .replace(/\}/g, "");
  };

  
  
  var addAriaAlert = D2L.LP.Web.UI.Html.Aria.LogMessage;
  var ariaQuizTimeLeftAlert = "You have {0} minutes left.";
  var lblTimeLimitExceeded = "Time Limit Exceeded";
  var lblTimeExceeded =
    hasAutoSubmit
      ? "Time&#39;s up!"
      : lblTimeLimitExceeded;

  
  var minuteWarnings = [];
  if (enforceTimeLimit && timeLeft >= 50 ) {
    
    if (timeLimit < 600 || timeLeft < 290 ) {
      
      minuteWarnings = [1];
    } else if (
      (timeLimit >= 1200 && timeLeft < 590) ||
      timeLimit < 1200 
    ) {
      
      minuteWarnings = [5, 1];
    } else if (timeLimit >= 1200) {
      
      minuteWarnings =
        timeLeft >= halfTimeEst * 60 - 10 ? [halfTimeEst, 5, 1] : [5, 1]; 
    }
  }

  var displayCountDown = function () {
    var navParams = new D2L.NavParams();
    navParams.SetParam("submissionTimeLimit", timeLimit / 60);
    navParams.SetParam("submissionGraceLimit", graceLimit / 60);
    navParams.SetParam("submissionLateLimit", lateLimit / 60);

    if (!enforceTimeLimit) {
      lblTimer.innerHTML = timeTakenDisplay;

      
    } else if (timeLeft > 0) {
      
      
      if (minuteWarnings.length > 0 && timeLeft <= minuteWarnings[0] * 60) {
        var minuteWarning = minuteWarnings.shift(); 
        addAriaAlert(ariaQuizTimeLeftAlert.replace(/\{0\}/g, minuteWarning));
        $(lblTimer).addClass("d2l-blinktext");
        setTimeout(function () {
          $(lblTimer).removeClass("d2l-blinktext");
        }, 5000 );

        if (enforceTimeLimit) {
          
          
          

          try {
            if (minuteWarning > 5) {
              
              toastText = new D2L.LP.Text.LangTerm(
                "Quizzes.TakeQuiz.msgHalftimeLeft",
              );
              parent.pageFrame.ShowTimeToast(toastText);
            } else if (hasAutoSubmit) {
              
              if (minuteWarning === 5) {
                toastText = new D2L.LP.Text.LangTerm(
                  "Quizzes.TakeQuiz.msgFiveMinutesLeftAutoSubmit",
                );
                parent.pageFrame.ShowTimeToast(toastText);
              } else {
                toastText = new D2L.LP.Text.LangTerm(
                  "Quizzes.TakeQuiz.msgOneMinuteLeftAutoSubmit",
                );
                parent.pageFrame.ShowTimeToast(toastText);
              }
            } else {
              
              if (minuteWarning === 5) {
                toastText = new D2L.LP.Text.LangTerm(
                  "Quizzes.TakeQuiz.msgXMinutesLeft",
                  minuteWarning,
                );
                parent.pageFrame.ShowTimeToast(toastText);
              } else {
                toastText = new D2L.LP.Text.LangTerm(
                  "Quizzes.TakeQuiz.msgOneMinuteLeft",
                );
                parent.pageFrame.ShowTimeToast(toastText);
              }
            }
          } catch (e) {
            
          }
        }
      }

      lblTimer.innerHTML = timeLeftDisplay;

      UpdateMeterProgress(timeTaken, timeLimit, meterRadius);
    } else if (!timeExceeded) {
      
      timeExceeded = true;

      if (hasAutoSubmit) {
        parent.autoSubmitTimeExceeded = true;
      }

      
      
      
      
      if (
        !hasExtendedDeadline &&
        timeLeft + graceLimit <= 0 &&
        !parent.finalAutoSaveOccurred
      ) {
        DoFinalAutoSave();
      }

      UpdateMeterProgress(timeTaken, timeLimit, meterRadius);

      
      addAriaAlert(lblTimeExceeded.replace(/&#39;/g, "'"));
      lblTimer.innerHTML = lblTimeExceeded;
      postTimeLimitExceededProcessing();
      
      
      if (enforceTimeLimit && !hasAutoSubmit) {
        try {
        const timeExceededToastTxt = new D2L.LP.Text.LangTerm(
            "Quizzes.TakeQuiz.msgTimesUp",
        );
        parent.pageFrame.ShowTimeToast(timeExceededToastTxt);
        } catch (e) {
        
        }
      }

      if (parent.pageFrame.quizzing_online) {
        
        if (!hasAutoSubmit) {
          Nav.SubmitAction("Custom", "texc", navParams);
        }
      }
    } else if (!graceExceeded) {
      lblTimer.innerHTML = lblTimeExceeded;
      UpdateMeterProgress(timeTaken, timeLimit, meterRadius);
      postTimeLimitExceededProcessing();

      if (timeLeft + graceLimit < 0) {
        graceExceeded = true;

        if (!parent.finalAutoSaveOccurred && !hasAutoSubmit) {
          DoFinalAutoSave();
        }

        if (parent.pageFrame.quizzing_online) {
          if (hasAutoSubmit || hasExtendedDeadline) {
            var alreadySubmitted = parent.quizAlreadySubmitted;

            if (!alreadySubmitted) {
              DoSubmitQuiz();
            }
          }
        }
      }
    } else if (!lateExceeded) {
      lblTimer.innerHTML = lblTimeExceeded;
      UpdateMeterProgress(timeTaken, timeLimit, meterRadius);
      postTimeLimitExceededProcessing();

      if (timeLeft + graceLimit + lateLimit < 0) {
        lateExceeded = true;
        if (hasExtendedDeadline) {
          Nav.SubmitAction("Custom", "llexc", navParams);
        }
      }
    } else {
      UpdateMeterProgress(timeTaken, timeLimit, meterRadius);
      lblTimer.innerHTML = lblTimeExceeded;
      postTimeLimitExceededProcessing();
    }
  };

  timeLeftDisplay = DisplayFormatTime(timeLeft); 
  timeTakenDisplay = DisplayFormatTime(timeTaken); 

  displayCountDown();

  var syncTimerBackoffCounter = 0;

  var countDownInterval = setInterval(function () {
    clientTimeTaken = GetClientTimeTakenSeconds(clientQuizStart);
    timeTaken = serverTimeTaken + clientTimeTaken;

    var timeLeftForLogging = timeLimit - timeTaken;

    if (enforceTimeLimit) {
      timeLeft = timeLimit - timeTaken;
      timeLeftDisplay = DisplayFormatTime(timeLeft);
    }
    timeTakenDisplay = DisplayFormatTime(timeTaken);
    displayCountDown();

    if (
      enforceTimeLimit &&
      timeExceeded &&
      graceExceeded &&
      (lateExceeded || lateLimit === 0) &&
      timeLeft + graceLimit + lateLimit < 0
    ) {
      clearInterval(countDownInterval);
    }

    
    var syncTimerBackoffThreshold = 5;
    if (typeof detectCountdownTimerErrorsCheckFrequency !== "undefined") {
      syncTimerBackoffThreshold = detectCountdownTimerErrorsCheckFrequency;
    }

    
    if (syncTimerBackoffCounter < 1) {
      var errorDetectionThresholdMs = 5000;
      if (typeof detectCountdownTimerErrorsThreshold !== "undefined") {
        errorDetectionThresholdMs = detectCountdownTimerErrorsThreshold;
      }
      
      var errorDetectionResult = DetectTimingError(
        errorDetectionThresholdMs,
        clientQuizStart,
        sanityCheckClientQuizStart,
      );
      if (errorDetectionResult.errorDetected === true) {
        
        
        var serverCallTime = GetClientTime();
        var serverCallSanityCheckTime = GetSanityCheckClientTime();

        
        ReSyncWithServer(
          function (rpcResponse) {
            clientQuizStart = serverCallTime;
            sanityCheckClientQuizStart = serverCallSanityCheckTime;
            var timeResults = rpcResponse.GetResult(); 
            timeTakenDisplay = timeResults[0];
            timeLeftDisplay = timeResults[1];
            serverTimeTaken = parseInt(timeResults[2]);
          },
          clientQuizStart,
          sanityCheckClientQuizStart,
          timeLeftForLogging,
          timeTaken,
          errorDetectionResult.timeTaken1,
          errorDetectionResult.currentTime1,
          errorDetectionResult.timeTaken2,
          errorDetectionResult.currentTime2,
        );
      }
    }

    if (syncTimerBackoffCounter++ >= syncTimerBackoffThreshold) {
      syncTimerBackoffCounter = 0;
    }
  }, 1000);
}

function GetClientTime() {
  if (window.performance && window.performance.now) {
    return window.performance.now();
  } else {
    return Date.now();
  }
}

function GetSanityCheckClientTime() {
  return Date.now();
}

function GetClientTimeTakenSeconds(clientStartTime) {
  var diff = (GetClientTime() - clientStartTime) / 1000;
  return Math.floor(diff);
}

function DetectTimingError(
  millisecondsThresholdForTimerError,
  clientStartTime,
  sanityCheckClientStartTime,
) {
  var useSanityCheck = window.performance && window.performance.now;

  var errorDetected = false;

  if (!useSanityCheck) {
    return {
      errorDetected,
    };
  }

  var currentTime1 = GetClientTime();
  var timeTaken1 = currentTime1 - clientStartTime;
  var currentTime2 = GetSanityCheckClientTime();
  var timeTaken2 = currentTime2 - sanityCheckClientStartTime;
  var diffInMilliseconds = Math.abs(timeTaken1 - timeTaken2);
  errorDetected = diffInMilliseconds > millisecondsThresholdForTimerError;

  return {
    errorDetected,
    currentTime1,
    timeTaken1,
    currentTime2,
    timeTaken2,
  };
}

function StartTimer() {
  var lblTimer = GetTBTimerControl();
  if (!lblTimer) {
    return; 
  }

  if (isPreviewingExpiredSynchronousQuiz && enforceTimeLimit) {
    var lblTimeLimitExceeded = "Time Limit Exceeded"
    lblTimer.innerHTML =
      hasAutoSubmit
        ? "Time&#39;s up!"
        : lblTimeLimitExceeded;

    postTimeLimitExceededProcessing();

    return;
  }

  if (!timeExceeded) {
    SetupHideShowTimerButton();
  }

  
  
  
  D2L.LP.Web.UI.Html.Aria.SetRole(lblTimer, "timer");
  D2L.LP.Web.UI.Html.Aria.SetAttribute(lblTimer, "live", "off");

  var clientQuizStart = GetClientTime();
  var sanityCheckClientQuizStart = GetSanityCheckClientTime();

  SyncWithServer(function (rpcResponse) {
    var timeResults = rpcResponse.GetResult(); 

    const METER_SIZE = 24;
    const METER_CENTER = METER_SIZE / 2;
    const METER_STROKE_WIDTH = 4;
    const METER_RADIUS = METER_CENTER - METER_STROKE_WIDTH / 2;

    
    if (enforceTimeLimit) {
      AttachMeter(METER_SIZE, METER_CENTER, METER_RADIUS, METER_STROKE_WIDTH);
    }

    TimeRequest(
      timeResults[0],
      timeResults[1],
      parseInt(timeResults[2]),
      clientQuizStart,
      sanityCheckClientQuizStart,
      METER_RADIUS,
    );
  });
}

    var confirmationBox = new D2L.Dialog.Confirm(

    hideTimerButtonDom = hideTimerButton.IDomNode;

  var showTimerButtonDom = null;

  }

    timerContainerDom = timerContainer.IDomNode;
  }

  var addAriaAlert = D2L.LP.Web.UI.Html.Aria.LogMessage;

    !(
      hideTimerButton &&
      hideTimerButtonDom &&
      showTimerButton &&
      showTimerButtonDom &&

  }

      timerDisplayContainerDom.style.transition = "1s";

      hideTimerButton.SetIsEnabled(true);

      hideTimerButtonDom.style.transition = "0.3s";
      hideTimerButtonDom.style.opacity = 1;

  var showButtonOnTab = function (event) {
    showButton();

    if (window.d2lFocusShowHideButton) {
      hideTimerButtonDom.focus();
    } else {
      window.d2lFocusShowHideButton = true;
    }
  };

  var handleHideTimerButtonClick = function () {
    hideTimerButton.SetIsEnabled(false);
    hideTimerButton.SetIsDisplayed(false);
    showTimerButton.SetIsDisplayed(true);
    D2L.Rpc.Create("UpdateStudentClockConfig").Call(false);
    timerDisplayContainerDom.style.transition = "0.3s";

      timerDisplayContainerDom.style.marginRight = "-150px";
    }, 300);
    window.setTimeout(function () {
      timerDisplayContainerDom.style.display = "none";
      showTimerButton.SetIsEnabled(true);
      addAriaAlert(msgTimerHidden);
    }, 600);
  };

  var handleShowTimerButtonClick = function () {
    hideTimerButton.SetIsDisplayed(true);
    showTimerButton.SetIsEnabled(false);
    showTimerButton.SetIsDisplayed(false);
    D2L.Rpc.Create("UpdateStudentClockConfig").Call(true);
    timerDisplayContainerDom.style.display = "block";
    window.setTimeout(function () {
      timerDisplayContainerDom.style.marginRight = "0px";
      timerDisplayContainerDom.style.transition = "0.3s";
      timerDisplayContainerDom.style.opacity = 1;
      showButton();
      addAriaAlert(msgTimerShown);

  var handleHideTimerButtonKeydown = function (e) {
    if (e.shiftKey && e.keyCode === 9) {
      window.d2lFocusShowHideButton = false;
      hideTimerButtonDom.blur();
    }
  };

  window.setTimeout(function () {
    hideButton();
  }, 2000);

  timerDisplayContainerDom.addEventListener("mouseenter", showButton);
  timerDisplayContainerDom.addEventListener("focus", showButtonOnTab);
  timerContainerDom.addEventListener("mouseleave", hideButton);
  hideTimerButtonDom.addEventListener("blur", hideButton);
  hideTimerButtonDom.addEventListener("click", handleHideTimerButtonClick);
  hideTimerButtonDom.addEventListener("keydown", handleHideTimerButtonKeydown);
  showTimerButtonDom.addEventListener("click", handleShowTimerButtonClick);
}
